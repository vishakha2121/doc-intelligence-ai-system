version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: doc_intelligence_db
    restart: always
    environment:
      POSTGRES_USER: doc_user
      POSTGRES_PASSWORD: doc_password
      POSTGRES_DB: doc_intelligence
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
    networks:
      - doc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_user -d doc_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: doc_intelligence_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doc_network
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_intelligence_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://doc_user:doc_password@postgres:5432/doc_intelligence
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: doc_user
      DATABASE_PASSWORD: doc_password
      DATABASE_NAME: doc_intelligence
      
      # Redis Configuration
      REDIS_URL: redis://:redis_password@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_VERSION: v1
      DEBUG: "True"
      ENVIRONMENT: development
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # CORS Configuration
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8080"]'
      
      # Gemini AI Configuration
      GEMINI_API_KEY: your-gemini-api-key-here
      
      # File Upload Configuration
      MAX_UPLOAD_SIZE: 10485760  # 10MB
      ALLOWED_EXTENSIONS: '["pdf", "png", "jpg", "jpeg", "tiff", "bmp"]'
      UPLOAD_DIR: /app/uploads
      
      # Logging Configuration
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/app.log
      
      # Tesseract Configuration
      TESSERACT_PATH: /usr/bin/tesseract
      TESSERACT_LANGUAGE: eng
      
      # Model Configuration
      MODEL_CACHE_DIR: /app/models
      SPACY_MODEL: en_core_web_sm
      
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: 60
      
      # Security
      BCRYPT_ROUNDS: 12
      
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./models:/app/models
      - ./backend/app:/app/app
      - tesseract_data:/usr/share/tesseract-ocr/4.00/tessdata
  
   

   

  
 

  

 

 


