version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: doc_intelligence_db
    restart: always
    environment:
      POSTGRES_USER: doc_user
      POSTGRES_PASSWORD: doc_password
      POSTGRES_DB: doc_intelligence
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
    networks:
      - doc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_user -d doc_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: doc_intelligence_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doc_network
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_intelligence_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://doc_user:doc_password@postgres:5432/doc_intelligence
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: doc_user
      DATABASE_PASSWORD: doc_password
      DATABASE_NAME: doc_intelligence
      
   
      
    
      
      
      
     
      
    
      
     
    
      
    
   

   

  
 

  

 

 


