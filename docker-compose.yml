version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: doc_intelligence_db
    restart: always
    environment:
      POSTGRES_USER: doc_user
      POSTGRES_PASSWORD: doc_password
      POSTGRES_DB: doc_intelligence
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
    networks:
      - doc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_user -d doc_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: doc_intelligence_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doc_network
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_intelligence_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://doc_user:doc_password@postgres:5432/doc_intelligence
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: doc_user
      DATABASE_PASSWORD: doc_password
      DATABASE_NAME: doc_intelligence
      
      # Redis Configuration
      REDIS_URL: redis://:redis_password@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_VERSION: v1
      DEBUG: "True"
      ENVIRONMENT: development
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # CORS Configuration
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8080"]'
      
      # Gemini AI Configuration
      GEMINI_API_KEY: your-gemini-api-key-here
      
      # File Upload Configuration
      MAX_UPLOAD_SIZE: 10485760  # 10MB
      ALLOWED_EXTENSIONS: '["pdf", "png", "jpg", "jpeg", "tiff", "bmp"]'
      UPLOAD_DIR: /app/uploads
      
      # Logging Configuration
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/app.log
      
      # Tesseract Configuration
      TESSERACT_PATH: /usr/bin/tesseract
      TESSERACT_LANGUAGE: eng
      
      # Model Configuration
      MODEL_CACHE_DIR: /app/models
      SPACY_MODEL: en_core_web_sm
      
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: 60
      
      # Security
      BCRYPT_ROUNDS: 12
      
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./models:/app/models
      - ./backend/app:/app/app
      - tesseract_data:/usr/share/tesseract-ocr/4.00/tessdata
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - doc_network
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc_intelligence_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_API_VERSION: v1
      REACT_APP_WEBSOCKET_URL: ws://localhost:8000/ws
      REACT_APP_ENV: development
      REACT_APP_DEBUG: "true"
      REACT_APP_UPLOAD_MAX_SIZE: 10485760
      REACT_APP_ALLOWED_EXTENSIONS: '["pdf","png","jpg","jpeg","tiff","bmp"]'
      REACT_APP_DEFAULT_LANGUAGE: en
      REACT_APP_THEME: light
      REACT_APP_ENABLE_ANALYTICS: "false"
      REACT_APP_SENTRY_DSN: ""
      REACT_APP_GOOGLE_ANALYTICS_ID: ""
      REACT_APP_FEATURE_FLAG_OCR: "true"
      REACT_APP_FEATURE_FLAG_CLASSIFICATION: "true"
      REACT_APP_FEATURE_FLAG_NER: "true"
      REACT_APP_FEATURE_FLAG_EXTRACTION: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - doc_network
    stdin_open: true
    tty: true

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: doc_intelligence_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/build:/usr/share/nginx/html
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - doc_network
    profiles:
      - production

  # PGAdmin for Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: doc_intelligence_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@doc.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - doc_network
    profiles:
      - devtools

  # Prometheus Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: doc_intelligence_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - doc_network
    profiles:
      - monitoring

  # Grafana Dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: doc_intelligence_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - doc_network
    profiles:
      - monitoring

 

 


